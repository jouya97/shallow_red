    { name = "mypy" },
    { name = "pytest" },
    { name = "pytest-cov" },
    { name = "ruff" },
]
ml = [
    { name = "torch" },
]

[package.metadata]
requires-dist = [
    { name = "chess", specifier = ">=1.11.2,<2" },
    { name = "hypothesis", marker = "extra == 'dev'", specifier = ">=6.100" },
    { name = "mypy", marker = "extra == 'dev'", specifier = ">=1.10" },
    { name = "numpy", specifier = ">=1.24,<2.3" },
    { name = "pytest", marker = "extra == 'dev'", specifier = ">=8" },
    { name = "pytest-cov", marker = "extra == 'dev'", specifier = ">=5" },
    { name = "ruff", marker = "extra == 'dev'", specifier = ">=0.8" },
    { name = "torch", marker = "extra == 'ml'", specifier = ">=2.3" },
]
provides-extras = ["dev", "ml"]
